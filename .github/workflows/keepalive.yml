# Mantiene despierto el servicio de Render mientras el plan free
# http://cron-job.org es más confiable si se prefiere un servicio externo
name: Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'  # cada 10 minutos
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-22.04
    steps:
      - name: Ping Render
        run: curl -sSf -o /dev/null ${{ secrets.RENDER_URL || 'https://presupuesto.onrender.com' }}/api/health
