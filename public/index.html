  <!-- MAIN WRAPPER -->
  <div id="main-wrapper">

    <!-- TOPBAR -->
    <header id="topbar">
      <div class="topbar-left">
        <button class="btn btn-icon" id="mobile-menu-btn" style="display:none">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
          <div class="topbar-title" id="topbar-title">Dashboard</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" id="theme-toggle" title="Cambiar tema">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path id="theme-icon" stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
        </button>
        <button class="btn btn-ghost btn-sm" id="alerts-btn" title="Alertas" style="position:relative">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
          <span id="alerts-count" class="badge badge-error" style="display:none;position:absolute;top:-4px;right:-6px;font-size:9px;min-width:16px;height:16px;padding:0 4px;line-height:16px">0</span>
        </button>
        <button class="btn btn-ghost btn-sm" id="logout-btn">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          <span>Salir</span>
        </button>
      </div>
    </header>

    <!-- PAGE CONTENT (SPA: modules render here) -->
    <main id="page-content">
      <div class="empty-state page-enter">
        <div class="empty-state-icon"><div class="spinner spinner-lg"></div></div>
        <p>Cargando...</p>
      </div>
    </main>

<!-- CDN Libraries -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- Service Worker -->
<script nonce="__NONCE__">
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('SW registered:', reg.scope);
    }).catch(err => {
      console.warn('SW registration failed:', err);
    });
  });
}
</script>

<!-- App JS (ES Modules) -->
<script type="module" src="/assets/js/app.js"></script>
